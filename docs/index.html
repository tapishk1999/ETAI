const LEX={excellent:3.1,outstanding:3.2,fantastic:3.3,wonderful:3.0,amazing:3.2,perfect:3.0,great:2.5,love:2.8,happy:2.6,impressed:2.7,superb:3.1,reliable:2.4,consistent:2.2,professional:2.1,efficient:2.3,satisfied:2.4,pleased:2.3,delighted:3.0,appreciate:2.2,thankful:2.5,smooth:1.9,fast:1.8,quick:1.8,prompt:2.0,accurate:2.0,helpful:2.2,resolved:2.0,improved:1.9,better:1.7,upgrade:1.8,priority:1.5,recommend:2.3,trust:2.1,committed:1.9,transparent:2.0,proactive:2.1,certainly:1.5,ok:0.9,okay:0.9,fine:0.8,decent:1.0,acceptable:0.9,sure:0.7,good:1.8,late:-1.5,delay:-1.8,delayed:-1.8,slow:-1.3,issue:-1.2,problem:-1.4,concern:-1.1,complaint:-1.5,wrong:-1.3,error:-1.2,mistake:-1.2,disappointed:-2.0,unhappy:-1.9,damaged:-2.5,missing:-2.6,lost:-2.3,broken:-2.4,unacceptable:-2.8,terrible:-2.9,horrible:-3.0,awful:-3.0,disaster:-2.8,ridiculous:-2.7,furious:-3.1,angry:-2.9,frustrated:-2.5,useless:-2.8,incompetent:-2.9,careless:-2.5,pathetic:-2.8,waste:-2.0,failed:-2.3,failure:-2.5,cancel:-2.0,quit:-1.9,switch:-1.7,rude:-2.5,ignored:-2.4,lawsuit:-3.0,refund:-1.5,compensation:-1.3,escalate:-1.6};
const BOOST={very:1.3,really:1.2,extremely:1.5,absolutely:1.4,completely:1.4,totally:1.3,highly:1.2,quite:1.1,seriously:1.3,genuinely:1.1};
const NEG=new Set(["not","no","never","don't","didn't","won't","can't","couldn't","shouldn't","wouldn't","isn't","aren't","wasn't","weren't","hardly","barely"]);
const CHURN_P=["moving to","switching to","already contacted","had a call with","cancel my contract","cancel contract","competitors","quickship","bluedart","delhivery","alternative","leaving"];
const ANGER_P=["ridiculous","unacceptable","disaster","furious","last chance","one chance","lost a client","costing us","nobody reads","rude","ignored","pathetic","incompetent","done being patient"];
function tok(t){return t.toLowerCase().replace(/['']/g,"'").replace(/[^a-z0-9\s']/g," ").split(/\s+/).filter(Boolean)}
function sent(text){
  if(!text?.trim())return{compound:0,pos:0,neg:0,neu:1,cs:0,as_:0};
  const tokens=tok(text),scores=[];
  const low=text.toLowerCase();let cs=0,as_=0;
  CHURN_P.forEach(p=>{if(low.includes(p))cs++});ANGER_P.forEach(p=>{if(low.includes(p))as_++});
  for(let i=0;i<tokens.length;i++){
    const base=LEX[tokens[i]];if(base==null)continue;
    let ng=false;for(let j=Math.max(0,i-3);j<i;j++)if(NEG.has(tokens[j])){ng=true;break}
    let bst=1;for(let j=Math.max(0,i-2);j<i;j++)if(BOOST[tokens[j]]){bst=BOOST[tokens[j]];break}
    let s=base*bst;if(ng)s*=-0.74;scores.push(s);
  }
  scores.push(...Array(cs).fill(-2.5));scores.push(...Array(Math.min(as_,5)).fill(-1.2));
  if(!scores.length)return{compound:0,pos:0,neg:0,neu:1,cs,as_};
  const raw=scores.reduce((a,b)=>a+b,0);const compound=Math.max(-1,Math.min(1,raw/Math.sqrt(raw*raw+15)));
  const pos=scores.filter(s=>s>0).reduce((a,b)=>a+b,0);const negv=Math.abs(scores.filter(s=>s<0).reduce((a,b)=>a+b,0));
  const tot=pos+negv+1e-6;
  return{compound,pos:pos/tot,neg:negv/tot,neu:Math.max(0,1-(pos+negv)/tot),cs,as_};
}
function arc(text){
  const lines=text.split("\n").filter(l=>/customer\s*:/i.test(l)||l.includes("CUSTOMER"));
  const src=lines.length?lines:text.split("\n").filter(Boolean);
  const seg=Math.max(1,Math.ceil(src.length/5));
  return["Opening","Early","Mid","Late","Closing"].map((label,i)=>({segment:label,score:Math.round(sent(src.slice(i*seg,(i+1)*seg).join(" ")).compound*100)}));
}
const SW=new Set(["i","me","my","we","you","your","he","she","they","it","is","are","was","be","been","have","has","had","do","does","did","will","would","could","should","may","might","can","the","a","an","and","or","but","in","on","at","to","for","of","with","this","that","from","by","as","so","if","am","up","out","about","into","just","our","us","let","get","got","ok","okay","right","well","yes","no","hi","hello","good","morning","afternoon","evening","thank","thanks","sure","really","very","oh","also","too","now","then","there","here","all","any","some","their","them","its","call","know","think","see","look","said","say","going","come","back","one","two","three","please","like","want","need","make","time"]);
const DIDF={damaged:2.8,missing:2.8,lost:2.5,broken:2.5,failed:2.4,unacceptable:2.6,cancel:3.0,switching:2.8,competitor:2.9,quickship:3.0,late:1.8,delay:1.9,delayed:1.9,reliability:1.8,escalate:2.2,manager:1.6,refund:2.2,compensation:1.9,upgrade:2.0,discount:1.9,excellent:1.8,fantastic:1.8,satisfied:1.7,delivery:0.7,order:0.7,package:0.9,route:1.0,agent:1.0};
const TPCS={"delivery issue":["delivery","deliver","undelivered","not delivered"],"damage / loss":["damaged","broken","missing","lost","destroyed"],"late arrival":["late","delay","delayed","slow","overdue"],"agent complaint":["rude","unprofessional","careless","agent","driver"],"billing / refund":["refund","compensation","invoice","billing","credit"],"churn risk":["cancel","leave","switch","competitor","alternative","moving","quickship"],"escalation":["escalate","manager","director","lawsuit","legal"],"positive feedback":["great","excellent","happy","reliable","efficient","impressed","satisfied"],"upsell opportunity":["upgrade","discount","tier","expand","volume","platinum"]};
function kw(text){
  const tokens=tok(text).filter(t=>t.length>3&&!SW.has(t));
  const freq={};tokens.forEach(t=>freq[t]=(freq[t]||0)+1);
  const total=tokens.length||1;const scores={};Object.entries(freq).forEach(([t,c])=>scores[t]=(c/total)*(DIDF[t]||1.0));
  const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([t])=>t);

  return{topTerms:ranked,topics:dt};
}

const FL={missed_deliveries:"Missed Deliveries",late_deliveries:"Late Deliveries",open_tickets:"Open Tickets",payment_delays:"Payment Delays",nps_inverse:"NPS (inverse)",order_velocity:"Order Velocity",call_sentiment:"Call Sentiment",churn_signals:"Churn Phrases",anger_signals:"Anger Phrases",tier_bias:"Customer Tier"};

  const fv={missed_deliveries:c.missed_deliveries,late_deliveries:c.late_deliveries,open_tickets:c.open_tickets,payment_delays:c.payment_delays,nps_inverse:Math.max(0,10-c.nps_score),order_velocity:Math.max(0,60-c.orders),call_sentiment:s.compound,churn_signals:s.cs,anger_signals:Math.min(s.as_,5),tier_bias:TB[c.tier]||0};
  const wt={};Object.entries(fv).forEach(([k,v])=>wt[k]=v*WG[k]);
  const lin=-2.1+Object.values(wt).reduce((a,b)=>a+b,0);const prob=sig(lin);
  const score=Math.max(0,Math.min(100,Math.round(prob*130)));
  const label=score>=72?"Critical":score>=52?"High":score>=32?"Moderate":"Low";
  const color=score>=72?"#ef4444":score>=52?"#f97316":score>=32?"#fbbf24":"#34d399";

  const imp=Object.entries(wt).map(([k,v])=>({feature:FL[k]||k,imp:Math.round(Math.abs(v)/ta*100),dir:v>0?"risk":"safe"})).sort((a,b)=>b.imp-a.imp);
  return{score,label,color,prob,imp};
}

function detectComp(text){

  COMPS.forEach(comp=>{comp.aliases.forEach(alias=>{const regex=new RegExp(alias,"gi");const matches=[...text.matchAll(regex)];matches.forEach(m=>{const start=Math.max(0,m.index-45);const end=Math.min(text.length,m.index+alias.length+45);hits.push({competitor:comp.name,color:comp.color,market:comp.market,context:"…"+text.slice(start,end).replace(/\n/g," ")+"…"})})})});
  return hits;
}

  setTimeout(()=>{const el=document.getElementById("pr-chart");if(!el)return;dC("prc");CR["prc"]=new Chart(el,{type:"bar",data:{labels:LEADS.map(l=>l.company.split(" ")[0]),datasets:[{data:LEADS.map(l=>l.fit),backgroundColor:LEADS.map(l=>scCol(l.fit)+"cc"),borderRadius:5,label:"Fit Score"}]},options:{responsive:true,scales:{x:{grid:{color:"#192838"},ticks:{color:"#3d6070"}},y:{min:0,max:100,grid:{color:"#192838"},ticks:{color:"#3d6070"}}},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0b1118",borderColor:"#192838",borderWidth:1}}}})},50);
}
