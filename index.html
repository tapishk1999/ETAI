/* ═══════════════════════════════════════════════════════════════════════════
   ②  ML ENGINE — VADER Sentiment
═══════════════════════════════════════════════════════════════════════════ */
const LEXICON = {excellent:3.1,outstanding:3.2,fantastic:3.3,wonderful:3.0,amazing:3.2,perfect:3.0,great:2.5,love:2.8,happy:2.6,impressed:2.7,superb:3.1,reliable:2.4,consistent:2.2,professional:2.1,efficient:2.3,satisfied:2.4,pleased:2.3,delighted:3.0,appreciate:2.2,thankful:2.5,smooth:1.9,fast:1.8,quick:1.8,prompt:2.0,accurate:2.0,helpful:2.2,resolved:2.0,improved:1.9,better:1.7,upgrade:1.8,priority:1.5,recommend:2.3,trust:2.1,committed:1.9,transparent:2.0,proactive:2.1,certainly:1.5,definitely:1.4,ok:0.9,okay:0.9,fine:0.8,decent:1.0,acceptable:0.9,reasonable:1.0,interested:1.2,sure:0.7,good:1.8,late:-1.5,delay:-1.8,delayed:-1.8,slow:-1.3,issue:-1.2,problem:-1.4,concern:-1.1,complaint:-1.5,wrong:-1.3,error:-1.2,mistake:-1.2,disappointed:-2.0,unhappy:-1.9,damaged:-2.5,missing:-2.6,lost:-2.3,broken:-2.4,unacceptable:-2.8,terrible:-2.9,horrible:-3.0,awful:-3.0,disaster:-2.8,ridiculous:-2.7,furious:-3.1,angry:-2.9,frustrated:-2.5,useless:-2.8,incompetent:-2.9,careless:-2.5,disgraceful:-2.9,pathetic:-2.8,waste:-2.0,failed:-2.3,failure:-2.5,cancel:-2.0,quit:-1.9,switch:-1.7,rude:-2.5,ignored:-2.4,lawsuit:-3.0,refund:-1.5,compensation:-1.3,escalate:-1.6};
const BOOSTERS = {very:1.3,really:1.2,extremely:1.5,absolutely:1.4,completely:1.4,totally:1.3,highly:1.2,quite:1.1,seriously:1.3,genuinely:1.1};
const NEGATORS = new Set(["not","no","never","don't","didn't","won't","can't","couldn't","shouldn't","wouldn't","isn't","aren't","wasn't","weren't","hardly","barely"]);
const CHURN_PHRASES = ["moving to","switching to","looking at other","already contacted","had a call with","cancel my contract","cancel contract","competitors","quickship","alternative","leaving"];
const ANGER_PHRASES = ["ridiculous","unacceptable","disaster","furious","last chance","one chance","lost a client","costing us","nobody reads","rude","ignored","pathetic","incompetent","done being patient"];

function tokenize(t){return t.toLowerCase().replace(/['']/g,"'").replace(/[^a-z0-9\s']/g," ").split(/\s+/).filter(Boolean)}

function analyzeSentiment(text){
  if(!text||!text.trim())return{compound:0,pos:0,neg:0,neu:1,churnSignals:0,angerSignals:0};
  const tokens=tokenize(text), scores=[];
  const low=text.toLowerCase();
  let churnHits=0,angerHits=0;
  CHURN_PHRASES.forEach(p=>{if(low.includes(p))churnHits++});
  ANGER_PHRASES.forEach(p=>{if(low.includes(p))angerHits++});
  for(let i=0;i<tokens.length;i++){
    const base=LEXICON[tokens[i]];
    if(base==null)continue;
    let negated=false;
    for(let j=Math.max(0,i-3);j<i;j++)if(NEGATORS.has(tokens[j])){negated=true;break}
    let boost=1;
    for(let j=Math.max(0,i-2);j<i;j++)if(BOOSTERS[tokens[j]]){boost=BOOSTERS[tokens[j]];break}
    let s=base*boost;
    if(negated)s*=-0.74;
    scores.push(s);
  }
  scores.push(...Array(churnHits).fill(-2.5));
  scores.push(...Array(Math.min(angerHits,5)).fill(-1.2));
  if(!scores.length)return{compound:0,pos:0,neg:0,neu:1,churnSignals:churnHits,angerSignals:angerHits};
  const raw=scores.reduce((a,b)=>a+b,0);
  const compound=Math.max(-1,Math.min(1,raw/Math.sqrt(raw*raw+15)));
  const pos=scores.filter(s=>s>0).reduce((a,b)=>a+b,0);
  const neg=Math.abs(scores.filter(s=>s<0).reduce((a,b)=>a+b,0));
  const tot=pos+neg+1e-6;
  return{compound,pos:pos/tot,neg:neg/tot,neu:Math.max(0,1-(pos+neg)/tot),churnSignals:churnHits,angerSignals:angerHits};
}

function sentimentArc(text){
  const lines=text.split("\n").filter(l=>/customer\s*:/i.test(l));
  const src=lines.length?lines:text.split("\n").filter(Boolean);
  const seg=Math.max(1,Math.ceil(src.length/5));
  return["Opening","Early","Mid","Late","Closing"].map((label,i)=>{
    const chunk=src.slice(i*seg,(i+1)*seg).join(" ");
    return{segment:label,score:Math.round(analyzeSentiment(chunk).compound*100)};
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   ③  TF-IDF TOPIC EXTRACTOR
═══════════════════════════════════════════════════════════════════════════ */
const STOPWORDS=new Set(["i","me","my","we","you","your","he","she","they","it","is","are","was","be","been","have","has","had","do","does","did","will","would","could","should","may","might","shall","can","the","a","an","and","or","but","in","on","at","to","for","of","with","this","that","from","by","as","so","if","am","up","out","about","into","just","our","us","let","get","got","ok","okay","right","well","yes","no","hi","hello","good","morning","afternoon","evening","thank","thanks","sure","really","very","oh","also","too","now","then","there","here","all","any","some","their","them","its","call","ll","m","s","re","ve","d","t","know","think","see","look","said","say","going","come","back","one","two","three","four","five","six","please","like","want","need","give","take","make","time"]);
const IDF={damaged:2.8,missing:2.8,lost:2.5,broken:2.5,failed:2.4,unacceptable:2.6,cancel:3.0,switching:2.8,competitor:2.9,quickship:3.0,late:1.8,delay:1.9,delayed:1.9,reliability:1.8,escalate:2.2,manager:1.6,lawsuit:3.0,refund:2.2,compensation:1.9,upgrade:2.0,discount:1.9,excellent:1.8,fantastic:1.8,satisfied:1.7,delivery:0.7,order:0.7,package:0.9,route:1.0,agent:1.0,customer:0.5,service:0.6};
const TOPICS={
  "delivery issue":["delivery","deliver","undelivered","failed delivery","not delivered"],
  "damage / loss":["damaged","broken","missing","lost","destroyed"],
  "late arrival":["late","delay","delayed","slow","overdue"],
  "agent complaint":["rude","unprofessional","careless","agent","driver"],
  "billing / refund":["refund","compensation","invoice","billing","credit"],
  "churn risk":["cancel","leave","switch","competitor","alternative","moving","quickship"],
  "escalation":["escalate","manager","director","lawsuit","legal"],
  "positive feedback":["great","excellent","happy","reliable","efficient","impressed","satisfied"],
  "upsell opportunity":["upgrade","discount","tier","expand","volume","platinum"],
  "resolution":["resolved","fixed","sorted","handled","addressed","solved"],
};

function extractKeywords(text){
  const tokens=tokenize(text).filter(t=>t.length>3&&!STOPWORDS.has(t));
  const freq={};tokens.forEach(t=>freq[t]=(freq[t]||0)+1);
  const total=tokens.length||1;
  const scores={};
  Object.entries(freq).forEach(([t,c])=>scores[t]=(c/total)*(IDF[t]||1.0));
  const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([t])=>t);
  const low=text.toLowerCase();
  const detectedTopics=[];
  Object.entries(TOPICS).forEach(([topic,kws])=>{
    if(kws.some(k=>low.includes(k)))detectedTopics.push(topic);
  });
  return{topTerms:ranked,topics:detectedTopics};
}

/* ═══════════════════════════════════════════════════════════════════════════
   ④  CHURN MODEL — Logistic Regression
═══════════════════════════════════════════════════════════════════════════ */
const TIER_BIAS={Platinum:-12,Gold:-6,Silver:0,Bronze:6};
const WEIGHTS={missed_deliveries:0.65,late_deliveries:0.30,open_tickets:0.55,payment_delays:0.45,nps_inverse:0.40,order_velocity:0.04,call_sentiment:-2.20,churn_signals:1.10,anger_signals:0.40,tier_bias:0.10};
const FEAT_LABELS={missed_deliveries:"Missed Deliveries",late_deliveries:"Late Deliveries",open_tickets:"Open Tickets",payment_delays:"Payment Delays",nps_inverse:"NPS (inverse)",order_velocity:"Order Velocity",call_sentiment:"Call Sentiment",churn_signals:"Churn Phrases",anger_signals:"Anger Phrases",tier_bias:"Customer Tier"};

function sigmoid(x){return 1/(1+Math.exp(-x))}

function predictChurn(c,sent){
  const fv={missed_deliveries:c.missed_deliveries,late_deliveries:c.late_deliveries,open_tickets:c.open_tickets,payment_delays:c.payment_delays,nps_inverse:Math.max(0,10-c.nps_score),order_velocity:Math.max(0,60-c.orders),call_sentiment:sent.compound,churn_signals:sent.churnSignals,anger_signals:Math.min(sent.angerSignals,5),tier_bias:TIER_BIAS[c.tier]||0};
  const weighted={};
  Object.entries(fv).forEach(([k,v])=>weighted[k]=v*WEIGHTS[k]);
  const linear=-2.1+Object.values(weighted).reduce((a,b)=>a+b,0);
  const prob=sigmoid(linear);
  const score=Math.max(0,Math.min(100,Math.round(prob*130)));
  const label=score>=72?"Critical":score>=52?"High":score>=32?"Moderate":"Low";
  const color=score>=72?"#ef4444":score>=52?"#f97316":score>=32?"#fbbf24":"#34d399";
  const totalAbs=Object.values(weighted).reduce((a,b)=>a+Math.abs(b),1e-9);
  const importances=Object.entries(weighted).map(([k,v])=>({feature:FEAT_LABELS[k]||k,importance:Math.round(Math.abs(v)/totalAbs*100),direction:v>0?"risk":"protective"})).sort((a,b)=>b.importance-a.importance);
  return{score,label,color,probability:prob,importances};
}

/* ═══════════════════════════════════════════════════════════════════════════
   ⑤  MOOD CLASSIFIER
═══════════════════════════════════════════════════════════════════════════ */
function classifyMood(sent,churnScore,openTickets){
  const c=sent.compound,cs=sent.churnSignals,as_=sent.angerSignals,neg=sent.neg;
  if(churnScore>=70&&c<-0.30)return{label:"Churning",emoji:"🚨",color:"#ef4444",confidence:90};
  if(cs>=2&&c<-0.20)return{label:"Churning",emoji:"🚨",color:"#ef4444",confidence:82};
  if(c<-0.45||as_>=4)return{label:"Angry",emoji:"😡",color:"#f87171",confidence:85};
  if(c>0.45&&sent.pos>0.55)return{label:"Highly Positive",emoji:"😊",color:"#34d399",confidence:90};
  if(c<-0.15||neg>0.55)return{label:"Frustrated",emoji:"😤",color:"#fb923c",confidence:75};
  if(c>0.15)return{label:"Positive",emoji:"🙂",color:"#6ee7b7",confidence:72};
  return{label:"Neutral",emoji:"😐",color:"#94a3b8",confidence:60};
}

/* ═══════════════════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════════════════ */
const TIER_ORDER=["Bronze","Silver","Gold","Platinum"];
function nextTier(tier){const i=TIER_ORDER.indexOf(tier);return TIER_ORDER[Math.min(i+1,3)]}

function generateScripts(c,churn,mood,keywords,sent){
  const scripts=[];
  const issues=keywords.topics.filter(t=>!["positive feedback","upsell opportunity","resolution"].includes(t)).slice(0,2).join(" and ")||"recent service issues";
  const credit=churn.score>=72?"15% credit on next month's invoices":churn.score>=52?"10% credit on next month's invoices":"a complimentary operations review";
  const nt=nextTier(c.tier);
  const savings=`₹${Math.round(c.contract_value*0.08).toLocaleString("en-IN")}`;

  if(churn.score>=40||["Churning","Angry"].includes(mood.label)){
    scripts.push({scenario:"Retention & Win-Back",tone:"Empathetic · Accountable · Solution-First",urgency:churn.score>=72?"CRITICAL":churn.score>=52?"HIGH":"MEDIUM",opener:`"Good [morning/afternoon], this is [Agent Name] from SwiftRoute's Priority Accounts team. I'm calling specifically about ${c.name}'s account — I want to personally ensure we get you the resolution you deserve."`,keyPoints:[`Acknowledge ${issues} without making excuses — take immediate ownership`,`Reference data: '${c.missed_deliveries} missed + ${c.late_deliveries} late deliveries is unacceptable for a ${c.tier} tier partner'`,"Propose a 30-day service guarantee with SLA breach penalties in the customer's favour","Introduce a dedicated account manager as single point of contact",`Offer ${credit} as goodwill gesture`],objectionHandlers:[{objection:`"I'm already looking at competitors"`,response:`"Before you decide, I'd like 15 minutes with our Operations Director to show you what changes we're making specifically for ${c.name}. We value this ₹${c.contract_value.toLocaleString("en-IN")} partnership."`},{objection:`"This has happened too many times"`,response:`"You're right. I'm assigning a dedicated route monitor for every ${c.name} order, plus a weekly check-in for 30 days. Can we try that?""`},{objection:`"We want a refund first"`,response:`"Authorising ${credit} right now. Written confirmation within the hour."`}],closer:`"I'll send a written commitment letter by end of day with your dedicated manager's direct line. You'll hear from [Manager Name] within 2 hours."`});
  }
  if(["Angry","Frustrated","Churning"].includes(mood.label)){
    scripts.push({scenario:"De-escalation & Recovery",tone:"Calm · Validating · Action-Oriented",urgency:mood.label==="Angry"?"CRITICAL":"HIGH",opener:`"Hello, this is [Agent Name] — I've been briefed on the challenges ${c.name} has faced with ${issues}. I'm not calling to apologise and disappear; I'm calling to fix this today."`,keyPoints:["Never interrupt — let the customer finish completely before responding","Mirror their key phrases to show you've truly listened","Replace 'I'll look into it' with 'I'm doing X right now'",`"I can see ${c.open_tickets} open tickets — I'm resolving all of them on this call"`,"Set a time-bound commitment: 'By [specific time], you'll have [specific outcome]'"],objectionHandlers:[{objection:`"Your company never follows through"`,response:`"This time I'll send you a written action plan with my name on it before we hang up — something you can hold us to."`},{objection:`"I want to speak to a manager"`,response:`"Of course — I'm connecting you with [Director Name] right after this call. Let me get the details first so they're fully briefed."`}],closer:`"Thank you for giving SwiftRoute this chance. My direct line and the action plan arrive in 10 minutes. You will see a change."`});
  }
  if(["Positive","Highly Positive"].includes(mood.label)||churn.score<35){
    scripts.push({scenario:`Upsell to ${nt} Tier`,tone:"Consultative · Value-Led · Collaborative",urgency:"LOW",opener:`"Hi [Customer Name], this is [Agent Name] from SwiftRoute. I've been reviewing ${c.name}'s delivery patterns and spotted opportunities to make your logistics even more efficient — got 5 minutes?"`,keyPoints:[`'${c.name} has completed ${c.orders} orders — you're in our top-performing ${c.city} segment'`,`You qualify for ${nt} tier — saving ${savings} annually`,`Same-day / cold-chain / time-slot delivery available as an upgrade`,`Real-time tracking dashboard with custom SLA alerts — strong operational ROI`,`Your ₹${c.contract_value.toLocaleString("en-IN")} contract qualifies for enhanced SLA`],objectionHandlers:[{objection:`"We're happy with the current setup"`,response:`"Great — the upgrade doesn't change operations, just gives more protection and a lower unit cost. No disruption, just more value."`},{objection:`"We need procurement approval"`,response:`"I'll prepare a one-page ROI business case. Would it help if I joined the presentation call?"`}],closer:`"I'll send the ${nt} proposal with a 30-day trial — no commitment until you decide. Sound fair?"`});
  }
  if(churn.score>=20&&churn.score<55&&scripts.length<3){
    scripts.push({scenario:"Proactive Check-in",tone:"Warm · Informative · Forward-Looking",urgency:"LOW",opener:`"Hi [Customer Name], this is [Agent Name] from SwiftRoute — doing quarterly reviews for our ${c.tier} partners. Just making sure everything with ${c.name} is running smoothly."`,keyPoints:["Share a positive data point: 'Your on-time rate this quarter is [X]%'","Ask: 'Is there anything you'd want us to do differently?'",`Introduce a new feature relevant to ${c.city}`,`Mention ${c.name} is close to qualifying for ${nt} tier benefits`,"Offer a dedicated support hotline number"],objectionHandlers:[{objection:`"We've had a few issues recently"`,response:`"I'm glad you mentioned that — pulling those incidents up right now so we can address each before I let you go."`}],closer:`"I'll follow up in 2 weeks. My direct line is here if anything comes up before then."`});
  }
  if(!scripts.length){scripts.push({scenario:"Proactive Check-in",tone:"Warm",urgency:"LOW",opener:`"Hi, this is [Agent Name] from SwiftRoute checking in on ${c.name}."`,keyPoints:["Check service satisfaction","Share performance data","Offer support"],objectionHandlers:[],closer:`"Thank you for your time — I'll follow up soon."`})}
  return scripts;
}

/* ═══════════════════════════════════════════════════════════════════════════
   ⑦  RADAR DATA BUILDER
═══════════════════════════════════════════════════════════════════════════ */
function buildRadar(c,sent){
  return[
    {metric:"Loyalty",value:Math.min(100,Math.round(c.orders/60*100))},
    {metric:"Satisfaction",value:Math.round(c.nps_score*10)},
    {metric:"Engagement",value:Math.max(0,100-c.open_tickets*14)},
    {metric:"Spend",value:Math.min(100,Math.round(c.avg_order_value/6000*100))},
    {metric:"Sentiment",value:Math.round(((sent.compound+1)/2)*100)},
    {metric:"Reliability",value:Math.max(0,100-c.missed_deliveries*10-c.late_deliveries*5)},
  ];
}

const STEPS=["Tokenising transcript…","Running VADER sentiment analysis…","Extracting TF-IDF keywords…","Scoring churn features (logistic regression)…","Classifying customer mood…","Generating dynamic scripts…","Building visualisations…"];

async function runPipeline(){
  const log=document.getElementById("call-log")?.value||"";
  if(!activeCustomer)return;
  destroyCharts();
  const out=document.getElementById("pipeline-output");
  out.innerHTML=`<div class="card" style="text-align:center;padding:36px">
    <div class="spin" style="font-size:30px;display:block">⚙</div>
    <div id="step-msg" style="font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:13px;margin:14px 0 16px">${STEPS[0]}</div>
    <div class="progress-steps">${STEPS.map((_,i)=>`<div class="step-dot" id="dot-${i}" style="width:${i===0?24:8}px"></div>`).join("")}</div>
  </div>`;

  for(let i=0;i<STEPS.length;i++){
    await new Promise(r=>setTimeout(r,280));
    const msg=document.getElementById("step-msg");
    if(msg)msg.textContent=STEPS[i];
    for(let j=0;j<=i;j++){const d=document.getElementById(`dot-${j}`);if(d){d.classList.add("done");d.style.width="24px"}}
  }

  const sent=analyzeSentiment(log);
  const arc=sentimentArc(log);
  const kw=extractKeywords(log);
  const churn=predictChurn(activeCustomer,sent);
  const mood=classifyMood(sent,churn.score,activeCustomer.open_tickets);
  const radar=buildRadar(activeCustomer,sent);
  const scripts=generateScripts(activeCustomer,churn,mood,kw,sent);

  activeResult={sent,arc,kw,churn,mood,radar,scripts};
  activeTab="overview"; activeScript=0;
  renderResults();
}

      <div class="card">
        <div class="section-label">Feature Importances (Logistic Regression Weights)</div>
        <canvas id="importance-chart" height="280"></canvas>
        <div style="display:flex;gap:12px;margin-top:8px">${pill("Risk factor","#f97316","pill-sm")}${pill("Protective factor","#34d399","pill-sm")}</div>
      </div>
      <div class="card">
        <div class="section-label">Model Output</div>
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-size:64px;font-family:'Syne',sans-serif;font-weight:800;color:${churn.color};line-height:1;text-shadow:0 0 40px ${churn.color}50">${churn.score}</div>
          <div style="font-size:11px;color:var(--muted);margin:4px 0 10px">Churn Score</div>
          ${pill(churn.label+" Risk",churn.color)}
        </div>
        <div style="font-size:12px;color:#5a8aaa;line-height:1.9">
          <div style="color:var(--accent);font-weight:700;margin-bottom:6px;font-family:'IBM Plex Mono',monospace">Architecture</div>
          <p>Model: <strong style="color:var(--text)">Logistic Regression</strong></p>
          <p>Features: <strong style="color:var(--text)">10 weighted inputs</strong></p>
          <p>Activation: <strong style="color:var(--text)">Sigmoid → ×1.3 scale</strong></p>
          <p>P(churn): <strong style="color:${churn.color}">${(churn.probability*100).toFixed(1)}%</strong></p>
          <div style="color:var(--accent);font-weight:700;margin:10px 0 6px;font-family:'IBM Plex Mono',monospace">Inputs</div>
          <p>CRM: tickets, missed, late, NPS…</p>
          <p>NLP: sentiment, anger/churn signals</p>
          <p>Tier bias: Platinum −12, Gold −6</p>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">Raw Feature Values → Model Input</div>
      <div class="grid-4" style="grid-template-columns:repeat(5,1fr)">
        ${[["Missed Deliveries",c.missed_deliveries,10,"#ef4444",false],["Late Deliveries",c.late_deliveries,15,"#f97316",false],["Open Tickets",c.open_tickets,6,"#f97316",false],["Payment Delays",c.payment_delays,6,"#fbbf24",false],["NPS Score",c.nps_score,10,"#34d399",true]].map(([l,v,max,col,inv])=>`<div style="background:#080c10;border-radius:8px;padding:12px 14px;border:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);margin-bottom:8px">${l}</div><div style="font-size:26px;font-weight:800;color:${col};font-family:'Syne',sans-serif">${v}</div><div style="height:3px;background:var(--border);border-radius:2px;margin-top:8px"><div style="height:100%;border-radius:2px;width:${(inv?(1-v/max):(v/max))*100}%;background:${col}"></div></div></div>`).join("")}
      </div>
    </div>
  </div>`;

  // ── SCRIPTS PANE ──
  const sc=scripts[activeScript];
  const scriptsPane=`<div class="pane${activeTab==="scripts"?" active":""}" id="pane-scripts">
    <div class="script-tabs">${scripts.map((s,i)=>`<button class="script-tab${activeScript===i?" active":""}" onclick="switchScript(${i})">${s.scenario}</button>`).join("")}</div>
    ${sc?`
    <div class="card" style="display:flex;gap:14px;align-items:center">
      <div>
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#f0f4f8">${sc.scenario}</span>
          ${pill(sc.urgency,urgColor(sc.urgency),"pill-sm")}
        </div>
        <div style="font-size:12px;color:var(--muted)">Tone: <span style="color:var(--accent)">${sc.tone}</span></div>
        <div style="font-size:11px;color:#2d4a5a;margin-top:4px;font-family:'IBM Plex Mono',monospace">Generated from churn=${churn.score}, mood=${mood.label}, topics=${kw.topics.slice(0,2).join(",")||"none"}</div>
      </div>
    </div>
    <div class="card" style="border-left:3px solid var(--accent)">
      <div class="section-label">🎙 Opening Line</div>
      <div style="font-size:14px;color:#a0c8e0;line-height:1.8;font-style:italic">${sc.opener}</div>
    </div>
    <div class="card">
      <div class="section-label">📌 Key Talking Points</div>
      ${sc.keyPoints.map((pt,i)=>`<div class="point-row"><span class="point-num">${i+1}</span><span style="font-size:13px;color:#8aaabb;line-height:1.6">${pt}</span></div>`).join("")}
    </div>
    <div class="card">
      <div class="section-label">🛡 Objection Handlers (predicted from NLP)</div>
      ${sc.objectionHandlers.map(oh=>`<div class="objection-row"><div class="obj-cust"><span style="color:#ef4444;font-weight:700;font-size:12px;min-width:70px">Customer:</span><span style="font-size:12px;color:#c88888;font-style:italic;line-height:1.6">${oh.objection}</span></div><div class="obj-agent"><span style="color:#34d399;font-weight:700;font-size:12px;min-width:70px">Agent:</span><span style="font-size:12px;color:#8ab8cc;line-height:1.6">${oh.response}</span></div></div>`).join("")}
    </div>
    <div class="card" style="border-left:3px solid #34d399">
      <div class="section-label">✅ Closing Line</div>
      <div style="font-size:14px;color:#a0c8e0;line-height:1.8;font-style:italic">${sc.closer}</div>
    </div>`:""}
  </div>`;

  document.getElementById("pipeline-output").innerHTML=`<div class="fadeup">${tabBar}${overviewPane}${sentPane}${churnPane}${scriptsPane}</div>`;

  // Draw charts
  requestAnimationFrame(()=>{
    if(activeTab==="overview")drawRadar(radar);
    if(activeTab==="sentiment")drawArc(arc);
    if(activeTab==="churn")drawImportance(churn.importances);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   ⑯  CHART RENDERERS
═══════════════════════════════════════════════════════════════════════════ */
const chartDefaults={color:"#5a8aaa",borderColor:"#192838",gridColor:"#192838"};

function drawRadar(radar){
  const el=document.getElementById("radar-chart");
  if(!el)return;
  if(chartInstances.radar)chartInstances.radar.destroy();
  chartInstances.radar=new Chart(el,{type:"radar",data:{labels:radar.map(r=>r.metric),datasets:[{data:radar.map(r=>r.value),borderColor:"#3b9ef0",backgroundColor:"rgba(59,158,240,0.15)",pointBackgroundColor:"#3b9ef0",pointRadius:4,borderWidth:2}]},options:{responsive:true,scales:{r:{grid:{color:"#192838"},pointLabels:{color:"#3d6070",font:{size:11}},ticks:{display:false},suggestedMin:0,suggestedMax:100}},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0b1118",borderColor:"#192838",borderWidth:1}}}});
}

function drawArc(arc){
  const el=document.getElementById("arc-chart");
  if(!el)return;
  if(chartInstances.arc)chartInstances.arc.destroy();
  const scores=arc.map(a=>a.score);
  chartInstances.arc=new Chart(el,{type:"line",data:{labels:arc.map(a=>a.segment),datasets:[{data:scores,borderColor:"#3b9ef0",backgroundColor:"rgba(59,158,240,0.1)",pointBackgroundColor:scores.map(s=>s>=20?"#34d399":s<=-20?"#ef4444":"#94a3b8"),pointRadius:6,fill:true,tension:0.4,borderWidth:2.5,label:"Sentiment Score"}]},options:{responsive:true,scales:{x:{grid:{color:"#192838"},ticks:{color:"#3d6070"}},y:{min:-100,max:100,grid:{color:"#192838"},ticks:{color:"#3d6070"}}},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0b1118",borderColor:"#192838",borderWidth:1}}}});
}

function drawImportance(importances){
  const el=document.getElementById("importance-chart");
  if(!el)return;
  if(chartInstances.imp)chartInstances.imp.destroy();
  chartInstances.imp=new Chart(el,{type:"bar",data:{labels:importances.map(f=>f.feature),datasets:[{data:importances.map(f=>f.importance),backgroundColor:importances.map(f=>f.direction==="risk"?"rgba(249,115,22,0.8)":"rgba(52,211,153,0.8)"),borderRadius:4,label:"Importance %"}]},options:{indexAxis:"y",responsive:true,scales:{x:{grid:{color:"#192838"},ticks:{color:"#3d6070",callback:v=>v+"%"}},y:{grid:{display:false},ticks:{color:"#5a8aaa",font:{size:11}}}},plugins:{legend:{display:false},tooltip:{backgroundColor:"#0b1118",borderColor:"#192838",borderWidth:1,callbacks:{label:c=>` ${c.raw}%`}}}}});
}

/* ═══════════════════════════════════════════════════════════════════════════
   ⑰  TAB SWITCHING
═══════════════════════════════════════════════════════════════════════════ */
function switchTab(id){
  activeTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.textContent.toLowerCase().includes(id.slice(0,4))));
  document.querySelectorAll(".pane").forEach(p=>p.classList.toggle("active",p.id==="pane-"+id));
  requestAnimationFrame(()=>{
    if(id==="overview"&&activeResult)drawRadar(activeResult.radar);
    if(id==="sentiment"&&activeResult)drawArc(activeResult.arc);
    if(id==="churn"&&activeResult)drawImportance(activeResult.churn.importances);
  });
}

function switchScript(i){activeScript=i;renderResults()}

/* ═══════════════════════════════════════════════════════════════════════════
   ⑱  INIT
═══════════════════════════════════════════════════════════════════════════ */
renderSidebar();
</script>
</body>
</html>
